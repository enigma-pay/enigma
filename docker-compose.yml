services:
  postgres:
    image: postgres:16-alpine
    container_name: enigma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: enigma
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - enigma-postgres-data:/var/lib/postgresql/data

  facilitator:
    image: ghcr.io/x402-rs/x402-facilitator:latest
    container_name: enigma-facilitator
    restart: unless-stopped
    environment:
      SOLANA_PRIVATE_KEY: ${SOLANA_PRIVATE_KEY}
    ports:
      - "8080:8080"
    volumes:
      - ./facilitator/config.json:/app/config.json:ro

volumes:
  enigma-postgres-data:
